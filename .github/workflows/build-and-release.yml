name: Build and release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name for the release (e.g. v0.7)'
        required: true
        default: 'v0.7'
  push:
    branches:
      - setup-gradle

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*','**/gradle/wrapper/gradle-wrapper.properties') }}

      - name: Grant execute for gradlew
        run: chmod +x ./gradlew || true

      - name: Build (Gradle)
        run: ./gradlew build --no-daemon --warning-mode all

      - name: List build artifacts
        run: ls -la build/libs || true

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.event.inputs.tag }}
          release_name: ${{ github.event.inputs.tag }}
          body: 'Automated release built by GitHub Actions (branch: setup-gradle)'
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload JAR(s) to Release
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPLOAD_URL: ${{ steps.create_release.outputs.upload_url }}
        run: |
          set -e
          if compgen -G "build/libs/*.jar" > /dev/null; then
            for f in build/libs/*.jar; do
              echo "Uploading $f"
              curl -s -X POST -H "Authorization: token $GITHUB_TOKEN" -H "Content-Type: application/java-archive" --data-binary @"$f" "${UPLOAD_URL}?name=$(basename $f)"
            done
          else
            echo "No jar artifacts found in build/libs"
            exit 1
          fi
