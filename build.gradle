plugins {
    id 'fabric-loom' version '1.2.10'
    id 'java'
    id 'maven-publish'
}

group = 'ftl2ndofficial.vcore'
version = '0.7'
archivesBaseName = 'vcore'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

repositories {
    mavenCentral()
    maven { url = 'https://maven.fabricmc.net/' }
}

dependencies {
    minecraft "com.mojang:minecraft:1.21"
    mappings "net.fabricmc:yarn:1.21+build.1:v2"
    modImplementation "net.fabricmc:fabric-loader:0.15.11"
    // modImplementation "net.fabricmc.fabric-api:fabric-api:<phiên_bản>"
}

loom {
    accessWidenerPath.set(file("src/main/resources/Vcore.accesswidener"))
}
